# controller_manager config for a dual-channel MDROBOT controller (PNT50,
# MD400T) laid out as a 2-wheel differential base.
#
# diff_cont drives motor1 (left) / motor2 (right) from /diff_cont/cmd_vel.
# wheel_separation / wheel_radius are placeholders — set them for your robot.
controller_manager:
  ros__parameters:
    # 15 Hz: a dual read()+write() cycle is ~3 serial round-trips at 19200 baud
    # (monitor read + VEL_CMD 130 + VEL_CMD2 131 writes) ≈ 50 ms, so 20 Hz overruns.
    update_rate: 15

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    diff_cont:
      type: diff_drive_controller/DiffDriveController

diff_cont:
  ros__parameters:
    left_wheel_names: ["motor1"]
    right_wheel_names: ["motor2"]
    wheel_separation: 0.30
    wheel_radius: 0.05
    # State feedback is in SI when counts_per_rev is set in the URDF.
    open_loop: false
    base_frame_id: base_link
    publish_rate: 20.0
    cmd_vel_timeout: 0.5
    use_stamped_vel: false
    # Keep limits permissive; the generic driver leaves safety to the robot layer.
    linear:
      x:
        max_velocity: 1.0
        min_velocity: -1.0
    angular:
      z:
        max_velocity: 2.0
        min_velocity: -2.0
